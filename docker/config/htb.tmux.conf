# htb.tmux.conf — container-only tmux tweaks, sourced after the pentest-env
# config. Force zsh as the login shell; ordinary tmux sessions remain available
# for detach/reattach only while this container is running. Session snapshots
# are deliberately not persisted because pane commands can contain secrets.
set -g default-shell /usr/bin/zsh
set -g default-command "zsh -l"
